name: Publish gop-logging-lib (GitHub Packages)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.0.0). Empty = snapshot logic"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-gop-logging-lib-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve publish version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.release_version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            BASE_VERSION="$(awk -F= '/^loggingLibVersion=/{print $2}' gradle.properties | tr -d '[:space:]')"
            if [[ -z "${BASE_VERSION}" ]]; then
              BASE_VERSION="1.0.0-SNAPSHOT"
            fi
            if [[ "${BASE_VERSION}" != *"-SNAPSHOT" ]]; then
              BASE_VERSION="${BASE_VERSION}-SNAPSHOT"
            fi
            VERSION="${BASE_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Resolve GitHub Packages endpoints
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          REPO_URL="https://maven.pkg.github.com/${GITHUB_REPOSITORY}"
          echo "release_url=${REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "snapshot_url=${REPO_URL}" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify build and conventions
        run: ./gradlew clean build validateLoggingConventions

      - name: Publish to GitHub Packages
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PACKAGES_USER: ${{ github.actor }}
        run: |
          ./gradlew publish \
            -PloggingLibVersion=${{ steps.version.outputs.version }} \
            -PgithubPackagesUser=${GITHUB_PACKAGES_USER} \
            -PgithubPackagesToken=${GITHUB_PACKAGES_TOKEN} \
            -PgithubPackagesReleaseUrl=${{ steps.repo.outputs.release_url }} \
            -PgithubPackagesSnapshotUrl=${{ steps.repo.outputs.snapshot_url }}

      - name: Publish summary
        run: |
          echo "Published version: ${{ steps.version.outputs.version }}"
          echo "Repository: https://maven.pkg.github.com/${GITHUB_REPOSITORY}"
