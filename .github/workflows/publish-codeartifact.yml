name: Publish gop-logging-lib

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.0.0). Empty = snapshot logic"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-gop-logging-lib-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
      CODEARTIFACT_RELEASE_REPOSITORY: ${{ vars.CODEARTIFACT_RELEASE_REPOSITORY }}
      CODEARTIFACT_SNAPSHOT_REPOSITORY: ${{ vars.CODEARTIFACT_SNAPSHOT_REPOSITORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CODEARTIFACT_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve publish version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.release_version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
          else
            BASE_VERSION="$(awk -F= '/^loggingLibVersion=/{print $2}' gradle.properties | tr -d '[:space:]')"
            if [[ -z "${BASE_VERSION}" ]]; then
              BASE_VERSION="1.0.0-SNAPSHOT"
            fi
            if [[ "${BASE_VERSION}" != *"-SNAPSHOT" ]]; then
              BASE_VERSION="${BASE_VERSION}-SNAPSHOT"
            fi
            VERSION="${BASE_VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Resolve CodeArtifact token and endpoints
        id: codeartifact
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${AWS_REGION}" || -z "${CODEARTIFACT_DOMAIN}" || -z "${CODEARTIFACT_DOMAIN_OWNER}" || -z "${CODEARTIFACT_RELEASE_REPOSITORY}" ]]; then
            echo "Missing required repository configuration. Check repository variables."
            exit 1
          fi

          SNAPSHOT_REPO="${CODEARTIFACT_SNAPSHOT_REPOSITORY:-$CODEARTIFACT_RELEASE_REPOSITORY}"

          TOKEN="$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --region "$AWS_REGION" \
            --query authorizationToken \
            --output text)"

          RELEASE_URL="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_RELEASE_REPOSITORY" \
            --format maven \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"

          SNAPSHOT_URL="$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$SNAPSHOT_REPO" \
            --format maven \
            --region "$AWS_REGION" \
            --query repositoryEndpoint \
            --output text)"

          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "snapshot_url=${SNAPSHOT_URL}" >> "$GITHUB_OUTPUT"

      - name: Verify build and conventions
        run: ./gradlew clean build validateLoggingConventions

      - name: Publish to CodeArtifact
        env:
          CODEARTIFACT_TOKEN: ${{ steps.codeartifact.outputs.token }}
        run: |
          ./gradlew publish \
            -PloggingLibVersion=${{ steps.version.outputs.version }} \
            -PcodeArtifactUser=aws \
            -PcodeArtifactToken=${CODEARTIFACT_TOKEN} \
            -PcodeArtifactReleaseUrl=${{ steps.codeartifact.outputs.release_url }} \
            -PcodeArtifactSnapshotUrl=${{ steps.codeartifact.outputs.snapshot_url }}

      - name: Publish summary
        run: |
          echo "Published version: ${{ steps.version.outputs.version }}"
          echo "Release repository: ${{ steps.codeartifact.outputs.release_url }}"
          echo "Snapshot repository: ${{ steps.codeartifact.outputs.snapshot_url }}"
